services:
    db:
        image: postgres:16-alpine
        container_name: vacation-db
        environment:
            POSTGRES_USER: vacation
            POSTGRES_PASSWORD: vacationpass
            POSTGRES_DB: vacationdb
        volumes:
            - db-data:/var/lib/postgresql/data

        #healthcheck configuration for the database service
        healthcheck:
            test: ["CMD-SHELL", "pg_isready", "-U", "vacation", "-d", "vacationdb"]
            interval: 10s
            timeout: 5s
            retries: 5
    
    # Backend service
    backend:
        build: ./backend
        container_name: vacation-backend
        environment:
            DATABASE_URL: postgresql://vacation:vacationpass@vacation-db/vacationdb
            PORT: 3001
            COUNTRIES_API_BASE_URL: https://restcountries.com/v3.1/all
            COUNTRIES_API_FALLBACK_URL: https://restcountries.com/v2/all
        ports:
            - "3001:3001"
        depends_on:
            db:
                condition: service_healthy
        restart: on-failure

    # Frontend service
    frontend:
        build: ./frontend
        container_name: vacation-frontend
        environment:
            REACT_APP_BACKEND_URL: http://localhost:3001
        ports:
            - "8080:80"
        volumes:
            - ./frontend:/usr/src/app
        depends_on:
            - backend

volumes:
    db-data:

